<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 400 120" fill="none">
  <defs>
    <linearGradient id="primary-grad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#e5b9c4"/>
      <stop offset="100%" stop-color="#c084fc"/>
    </linearGradient>
    <linearGradient id="accent-grad" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" stop-color="#c084fc"/>
      <stop offset="100%" stop-color="#e5b9c4"/>
    </linearGradient>
    <linearGradient id="icon-grad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#e5b9c4"/>
      <stop offset="50%" stop-color="#d4a5b2"/>
      <stop offset="100%" stop-color="#c084fc"/>
    </linearGradient>
    <filter id="glow">
      <feGaussianBlur stdDeviation="3" result="blur"/>
      <feMerge>
        <feMergeNode in="blur"/>
        <feMergeNode in="SourceGraphic"/>
      </feMerge>
    </filter>
    <filter id="soft-glow">
      <feGaussianBlur stdDeviation="6" result="blur"/>
      <feMerge>
        <feMergeNode in="blur"/>
        <feMergeNode in="SourceGraphic"/>
      </feMerge>
    </filter>
  </defs>

  <!-- Icon mark: Abstract petal / lens shape -->
  <g transform="translate(20, 12)" filter="url(#glow)">
    <!-- Outer petal -->
    <path d="M48 8 C68 8, 88 28, 88 48 C88 68, 68 88, 48 88 C28 88, 8 68, 8 48 C8 28, 28 8, 48 8 Z"
          fill="none" stroke="url(#primary-grad)" stroke-width="2" opacity="0.3"/>

    <!-- Inner diamond / eye shape -->
    <path d="M48 18 C62 28, 78 42, 78 48 C78 54, 62 68, 48 78 C34 68, 18 54, 18 48 C18 42, 34 28, 48 18 Z"
          fill="url(#icon-grad)" opacity="0.15"/>
    <path d="M48 18 C62 28, 78 42, 78 48 C78 54, 62 68, 48 78 C34 68, 18 54, 18 48 C18 42, 34 28, 48 18 Z"
          fill="none" stroke="url(#icon-grad)" stroke-width="2.5"/>

    <!-- Inner circle (AI dot) -->
    <circle cx="48" cy="48" r="10" fill="url(#primary-grad)" opacity="0.9"/>
    <circle cx="48" cy="48" r="10" fill="none" stroke="url(#accent-grad)" stroke-width="1.5" opacity="0.6"/>

    <!-- Sparkle accent -->
    <circle cx="48" cy="48" r="3" fill="#fff" opacity="0.9"/>

    <!-- Orbital ring -->
    <ellipse cx="48" cy="48" rx="30" ry="14" fill="none" stroke="url(#accent-grad)" stroke-width="1"
             opacity="0.4" transform="rotate(-30, 48, 48)"/>
  </g>

  <!-- Wordmark -->
  <g transform="translate(125, 30)">
    <!-- "Beauty" in serif italic -->
    <text font-family="Georgia, 'Times New Roman', serif" font-size="42" font-weight="700"
          font-style="italic" fill="url(#primary-grad)" letter-spacing="-1.5">
      <tspan>Beauty</tspan>
    </text>
    <!-- "Ops" in clean sans -->
    <text x="155" font-family="-apple-system, 'Segoe UI', Helvetica, Arial, sans-serif"
          font-size="42" font-weight="300" fill="#f8fafc" letter-spacing="-0.5" opacity="0.95">
      <tspan>Ops</tspan>
    </text>
  </g>

  <!-- Tagline -->
  <text x="127" y="75" font-family="-apple-system, 'Segoe UI', Helvetica, Arial, sans-serif"
        font-size="11" fill="#f8fafc" letter-spacing="4" text-transform="uppercase" opacity="0.35" font-weight="600">
    INTELLIGENCE PLATFORM
  </text>

  <!-- Subtle accent line -->
  <line x1="125" y1="52" x2="260" y2="52" stroke="url(#primary-grad)" stroke-width="0.75" opacity="0.2"/>
</svg>
